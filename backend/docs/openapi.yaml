  /api/v1/admin/properties/{property_id}/suspend:
    patch:
      tags: [Admin]
      summary: Suspend a property listing
      operationId: admin_suspend_property
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      responses:
        "204":
          description: Property suspended

  /api/v1/admin/complaints:
    get:
      tags: [Admin]
      summary: List all complaints
      operationId: admin_list_complaints
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, IN_REVIEW, RESOLVED, CLOSED]
      responses:
        "200":
          description: Complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplaintOut"

  /api/v1/admin/complaints/{complaint_id}/resolve:
    patch:
      tags: [Admin]
      summary: Mark complaint as resolved
      operationId: admin_resolve_complaint
      parameters:
        - name: complaint_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Resolved complaint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintOut"

  /api/v1/admin/settings:
    get:
      tags: [Admin]
      summary: Get all system settings
      operationId: admin_get_settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemSettingOut"

  /api/v1/admin/settings/{key}:
    patch:
      tags: [Admin]
      summary: Update a system setting
      operationId: admin_update_setting
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          example: "max_listing_images"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSettingUpdate"
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettingOut"

  /api/v1/admin/audit-logs:
    get:
      tags: [Admin]
      summary: View audit logs
      operationId: admin_audit_logs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        user_id:
                          type: string
                          format: uuid
                          nullable: true
                        action:
                          type: string
                          example: "LOGIN"
                        entity_name:
                          type: string
                          example: "User"
                        entity_id:
                          type: string
                          format: uuid
                          nullable: true
                        ip_address:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                          format: date-time

  # ────────────────────────── PRICE INTELLIGENCE ─────────────────────────────

  /api/v1/predict-price/:
    post:
      tags: [Price Intelligence]
      summary: Predict fair market rental value
      description: |
        XGBoost hedonic pricing model. Predicts fair market rent based on:
        ward, rooms, utilities, distance to transit, and furnishing.
        If the listed price is higher than predicted by >10%, `is_overpriced` is set.
      security: []
      operationId: price_predict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricePredictionRequest"
            example:
              ward: "Mikocheni"
              structural_rooms: 1
              water_reliability: "daily"
              electricity_config: "luku"
              distance_to_transit_m: 300
              floor_area_sqm: 18
              is_furnished: false
              has_wifi: false
      responses:
        "200":
          description: Price prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricePredictionResponse"

  /api/v1/predict-price/flag-listing:
    post:
      tags: [Price Intelligence]
      summary: Compare listed price against ML estimate
      description: Returns `is_overpriced=true` if listed price exceeds prediction by >10%.
      security: []
      operationId: price_flag_listing
      parameters:
        - name: listed_price
          in: query
          required: true
          schema:
            type: number
            format: float
          example: 300000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricePredictionRequest"
      responses:
        "200":
          description: Price flag result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricePredictionResponse"

  # ────────────────────────────── CONVERSATION ───────────────────────────────

  /api/v1/conversation/message:
    post:
      tags: [Conversation]
      summary: Send a chat message to the AI assistant (REST)
      description: |
        Bilingual NLP chatbot. Understands Swahili and English.
        Classifies intent: `search_accommodation`, `predict_fair_price`, `view_amenities`.
        Triggers property search automatically when intent is `search_accommodation`.
      security: []
      operationId: conversation_message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationRequest"
            examples:
              swahili:
                summary: Swahili search
                value:
                  message: "Natafuta chumba Mikocheni chini ya 200,000"
                  session_id: "sess_abc123"
              english:
                summary: English price query
                value:
                  message: "What is the fair price for a room in Sinza?"
      responses:
        "200":
          description: AI response with parsed intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationResponse"

  /api/v1/conversation/history/{session_id}:
    get:
      tags: [Conversation]
      summary: Get conversation history for a session
      security: []
      operationId: conversation_history
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          example: "sess_abc123"
      responses:
        "200":
          description: Session conversation history
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  history:
                    type: array
                    items:
                      type: object

  /api/v1/conversation/ws/{session_id}:
    get:
      tags: [Conversation]
      summary: Real-time WebSocket chat
      description: |
        Connect via WebSocket for real-time bilingual chat.
        
        **Client frame format (JSON string):**
        ```json
        { "message": "Natafuta hostel karibu na IAA" }
        ```
        
        **Server frame format (JSON string):**
        ```json
        {
          "session_id": "sess_abc123",
          "reply": "Nimepata hosteli 3 karibu na IAA…",
          "parsed_intent": { ... },
          "action_triggered": "TRIGGER_SEARCH"
        }
        ```
        
        **WebSocket URL:** `ws://localhost:8000/api/v1/conversation/ws/{session_id}`
      security: []
      operationId: conversation_websocket
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          example: "sess_abc123"
      responses:
        "101":
          description: WebSocket connection established

  # ─────────────────────────────── AMENITIES ─────────────────────────────────

  /api/v1/amenities/nearby:
    get:
      tags: [Amenities]
      summary: Find POIs near a coordinate
      security: []
