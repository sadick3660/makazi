        - name: radius_m
          in: query
          schema:
            type: number
            default: 1000
          example: 500
      responses:
        "200":
          description: Nearby amenities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/v1/amenities/property/{property_id}:
    get:
      tags: [Amenities]
      summary: Get amenities for a specific property
      security: []
      operationId: amenities_by_property
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      responses:
        "200":
          description: Property amenities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # ─────────────────────────────── PARAMETERS ────────────────────────────────

parameters:
  PropertyId:
    name: property_id
    in: path
    required: true
