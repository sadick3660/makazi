      operationId: notifications_mark_all_read
      responses:
        "204":
          description: All notifications marked as read

  # ────────────────────────────────── ADMIN ──────────────────────────────────

  /api/v1/admin/stats:
    get:
      tags: [Admin]
      summary: Platform analytics dashboard
      description: Returns real-time platform statistics. Requires ADMIN role.
      operationId: admin_stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Admin access required

  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: List all users
      operationId: admin_list_users
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [SEEKER, LANDLORD, ADMIN]
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, SUSPENDED, BANNED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserOut"

  /api/v1/admin/users/{user_id}/suspend:
    patch:
      tags: [Admin]
